      <h1>CADASTRAR DESPESA</h1>
      <h6>Cadastre uma nova despesa no sistema</h6>
      <hr>
      <br>
      <form>
          <div class="row">
              <div class="form-group col-3">
               <h6>FUNCIONARIO </h6>
               <select class="form-select" arialabel="Default select example">
                  <option value="">JAQUELINE ARRABAL</option>
               </select>
              </div>
              <div class="form-group col-2">
               <h6>DATA </h6>
               <input type="date" class="form-control">
              </div>
          </div>
          <br>
          <div class="row">
              <div class="form-group col-3">
               <h6>PROFISSIONAL </h6>
               <select class="form-select">
                  <option value="">MARIA APARECIDA YAMAMOTO</option>
               </select>
              </div>
              <div class="form-group col-1">
               <h6>VALOR </h6>
               <input type="text" class="form-control">
              </div>
          </div>
          <br>
          <div class="row">
              <div class="form-group col-3">
               <h6>DESCRIÇÃO </h6>
               <textarea class="form-control" rows="5"></textarea>
              </div>
              <div class="form-group col-1">
               <h6>ID </h6>
               <input type="text" class="form-control">
              </div>
          </div>
          <br>


      </form>
